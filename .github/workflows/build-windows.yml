name: Build App

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r sp500_watcher/requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: >
          pyinstaller
          --name sp500_watcher
          --windowed
          --onefile
          --collect-all webview
          --hidden-import webview.platforms.edgechromium
          --exclude-module pythonnet
          --exclude-module clr
          --exclude-module clr_loader
          --noconfirm
          sp500_watcher/sp500_watcher.py

      - name: Smoke test
        run: |
          $proc = Start-Process -FilePath "dist\sp500_watcher.exe" -PassThru
          Start-Sleep -Seconds 15
          if ($proc.HasExited) {
            Write-Error "Smoke test FAILED: process exited with code $($proc.ExitCode)"
            exit 1
          }
          $proc.Kill()
          Write-Host "Smoke test PASSED"

      - name: Prepare release folder
        run: |
          New-Item -ItemType Directory -Force -Path dist\sp500_watcher_release
          Copy-Item dist\sp500_watcher.exe dist\sp500_watcher_release\sp500_watcher.exe
          Copy-Item sp500_watcher\howto.txt dist\sp500_watcher_release\howto.txt
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "dist\sp500_watcher_release\WebView2Setup.exe"

      - name: Package as zip
        run: Compress-Archive -Path dist\sp500_watcher_release\* -DestinationPath sp500_watcher_windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sp500_watcher_windows
          path: sp500_watcher_windows.zip
          retention-days: 30

  build-mac:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            arch: arm64
          - runner: macos-13
            arch: intel
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r sp500_watcher/requirements.txt
          pip install pyinstaller

      - name: Build app bundle
        run: >
          pyinstaller
          --name sp500_watcher
          --windowed
          --collect-all webview
          --noconfirm
          sp500_watcher/sp500_watcher.py

      - name: Package as zip
        run: |
          cp sp500_watcher/howto.txt dist/howto.txt
          cd dist && zip -r ../sp500_watcher_mac_${{ matrix.arch }}.zip sp500_watcher.app howto.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sp500_watcher_mac_${{ matrix.arch }}
          path: sp500_watcher_mac_${{ matrix.arch }}.zip
          retention-days: 30
